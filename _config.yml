# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.

# ============================================================
# BASIC SITE SETTINGS
# ============================================================
locale                   : "en-US"
site_theme               : "air"  # Options: "default", "air", "sunrise", "mint", "dirt", "contrast"
title                    : "Jian Sun | Fatigue & Fracture Mechanics"
title_separator          : "-"
name                     : &name "孙健"
description              : &description "Personal academic portfolio of Jian Sun — PhD applicant in fatigue, fracture, and computational mechanics"
url                      : https://sun-jian-ucas.github.io  # ✅ 已改为你的实际域名
baseurl                  : ""
repository               : "sun-jian-ucas/sun-jian-ucas.github.io"  # ✅ 已改为你的仓库名

# ============================================================
# SITE AUTHOR — 侧边栏个人信息
# ============================================================
author:
  # -------- 基本信息 --------
  avatar           : "assets/images/profile.jpg"
  name             : "Jian Sun"
  pronouns         : "he/him"
  bio              : "PhD applicant in Fatigue & Fracture Mechanics · M.S. from UCAS, Institute of Mechanics · Publications in *EFM* and *IJF*"
  location         : "Beijing, China"
  employer         : "Institute of Mechanics, Chinese Academy of Sciences"
  uri              : "https://sun-jian-ucas.github.io"

  # -------- 联系方式 --------
  email            : "sunjian201@mails.ucas.ac.cn"

  # -------- 学术平台（Google Scholar 已配置） --------
  googlescholar    : "https://scholar.google.com/citations?hl=zh-CN&user=WouuqEgAAAAJ"  # ✅ 已改为你的 Google Scholar
  orcid            : ""  # 建议去 https://orcid.org 注册一个并填在这里
  researchgate     : ""  # 如果有 ResearchGate 账号可填
  academia         : ""
  arxiv            : ""
  inspire-hep      : ""
  impactstory      : ""
  semantic         : ""
  ssrn             : ""
  pubmed           : ""
  scopus           : ""
  zotero           : ""

  # -------- GitHub 与代码 --------
  github           : "sun-jian-ucas"  # ✅ 已改为你的 GitHub 用户名
  bitbucket        : ""
  codepen          : ""
  dribbble         : ""
  kaggle           : ""
  stackoverflow    : ""

  # -------- 社交媒体（可选） --------
  #bluesky          : ""
  #linkedin         : ""  # 如果有 LinkedIn 可填
  #mastodon         : ""
  #medium           : ""
  #twitter          : ""
  #zhihu            : ""
  #weibo            : ""
  #instagram        : ""
  #facebook         : ""

# ============================================================
# PUBLICATION CATEGORIES
# ============================================================
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# ============================================================
# SITE BEHAVIOR
# ============================================================
teaser                   : ""
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               : false

atom_feed:
  hide                   : false
  path                   : ""

# ============================================================
# SEO & SOCIAL SHARING
# ============================================================
google_site_verification : ""
bing_site_verification   : ""
alexa_site_verification  : ""
yandex_site_verification : ""

twitter:
  username               : ""
facebook:
  username               : ""
  app_id                 : ""
  publisher              : ""
og_image                 : ""
og_description           : ""

social:
  type                   : "Person"
  name                   : "Jian Sun"
  links:
    - "https://scholar.google.com/citations?hl=zh-CN&user=WouuqEgAAAAJ"
    - "https://github.com/sun-jian-ucas"

# ============================================================
# ANALYTICS（可选）
# ============================================================
analytics:
  provider               : "false"
  google:
    tracking_id          : ""

# ============================================================
# FILE HANDLING
# ============================================================
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# ============================================================
# MARKDOWN PROCESSING
# ============================================================
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# ============================================================
# COLLECTIONS
# ============================================================
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# ============================================================
# DEFAULTS
# ============================================================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# ============================================================
# SASS
# ============================================================
sass:
  sass_dir: _sass
  style: compressed

# ============================================================
# PERMALINKS & TIMEZONE
# ============================================================
permalink: /:categories/:title/
timezone: Asia/Shanghai

# ============================================================
# PLUGINS
# ============================================================
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# ============================================================
# ARCHIVES
# ============================================================
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# ============================================================
# HTML COMPRESSION
# ============================================================
compress_html:
  clippings: all
  ignore:
    envs: development
